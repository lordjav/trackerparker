spring.application.name=TrackerParker
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.allow-pool-suspension=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
# Flyway can acquire metadata and migration connections concurrently at boot.
# It uses short-lived direct connections so the Lambda runtime Hikari pool stays at one.
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

server.address=0.0.0.0
server.port=${PORT:8080}

logging.level.root=${LOG_LEVEL:INFO}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}
app.origin-secret.required=${ORIGIN_SECRET_REQUIRED:false}
app.origin-secret.value=${ORIGIN_SECRET:}
